name: autoreel
description: "Rev up your car buying and selling experience in the UAE with this sleek, Instagram Reels-inspired app, offering a seamless scrollable feed, rich video listings, and direct WhatsApp seller contact."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  http: ^1.0.0
  flutter_image_compress: ^2.0.0
  share_plus: ^12.0.0
  firebase_auth: '>=5.3.3'
  # image_cropper: ^5.0.1  # removed due to web incompatibility; using custom cropper
  firebase_storage: ^13.0.0
  cloud_firestore: '>=5.5.0'
  file_picker: '>=8.1.2'
  video_player: '>=2.9.2'
  flutter_svg: ^2.0.10+1
  image_picker: '>=1.1.2'
  url_launcher: ^6.0.0
  shared_preferences: ^2.2.3
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/dreamflow_icon.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
